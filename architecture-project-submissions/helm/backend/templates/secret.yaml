# =============================================================================
# Backend Secret — sensitive environment variables
#
# Stores credentials that must not be stored in plain text. Kubernetes Secrets
# hold base64-encoded values (b64enc) and are mounted as env vars in the
# Deployment via `envFrom.secretRef`.
#
# PRODUCTION NOTE:
#   The values here come from .Values which are set via --set or -f at install
#   time. For GitOps workflows, replace this template with one of:
#     - Sealed Secrets (https://github.com/bitnami-labs/sealed-secrets)
#       Encrypts secrets so they can be safely committed to git.
#     - External Secrets Operator (https://external-secrets.io)
#       Pulls secrets from Vault, AWS Secrets Manager, Azure Key Vault, etc.
#   Neither approach requires changing the Deployment template — the Secret
#   resource is swapped for an ExternalSecret CRD and the env vars remain
#   identical from the application's perspective.
# =============================================================================
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "backend.fullname" . }}-secret
  labels:
    {{- include "backend.labels" . | nindent 4 }}
type: Opaque
data:
  # ── Database URL ────────────────────────────────────────────────────────────
  # Assembled by the backend.databaseUrl helper function using the release name
  # to construct the PostgreSQL subchart service hostname. The full URL is stored
  # here (rather than just the password) so the application only needs to read
  # one env var for its SQLAlchemy connection string.
  DATABASE_URL: {{ include "backend.databaseUrl" . | b64enc | quote }}

  # ── Keycloak client secret ──────────────────────────────────────────────────
  # The confidential client secret created in the Keycloak admin console.
  # Used by the backend to authenticate as a service account when calling
  # Keycloak admin APIs (optional — only needed if KEYCLOAK_ADMIN_USERNAME is set).
  KEYCLOAK_CLIENT_SECRET: {{ .Values.keycloak.clientSecret | b64enc | quote }}

  # ── S3 / MinIO credentials ──────────────────────────────────────────────────
  # Must match minio.auth.rootUser and minio.auth.rootPassword in values.yaml.
  S3_ACCESS_KEY: {{ .Values.s3.accessKey | b64enc | quote }}
  S3_SECRET_KEY: {{ .Values.s3.secretKey | b64enc | quote }}
