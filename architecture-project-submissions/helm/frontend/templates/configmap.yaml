# =============================================================================
# Frontend ConfigMap
#
# Contains two data entries consumed by the nginx container:
#
#   nginx.conf
#     Custom nginx server block. Mounts to /etc/nginx/conf.d/default.conf.
#     Serves the React SPA with a fallback to index.html for client-side
#     routing, and proxies /api/* to the backend service.
#
#   config.js.template
#     A JavaScript file with $PLACEHOLDER tokens. The container entrypoint
#     (docker-entrypoint.sh) runs `envsubst` over this file at pod startup,
#     writing the result to /usr/share/nginx/html/config.js.
#     The React app reads window.__APP_CONFIG__ from this file via a shim
#     at the top of src/main.tsx, making the image environment-agnostic.
#
# Changes to this ConfigMap trigger a pod restart because the Deployment
# template includes a checksum annotation over this file.
# =============================================================================
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "frontend.fullname" . }}-config
  labels:
    {{- include "frontend.labels" . | nindent 4 }}
data:
  # ── nginx.conf ──────────────────────────────────────────────────────────────
  nginx.conf: |
    server {
        # nginx-unprivileged listens on 8080 instead of 80 to avoid needing
        # CAP_NET_BIND_SERVICE. This is the standard OpenShift-safe approach.
        listen 8080;
        server_name _;

        # Serve compiled React build assets from the standard nginx html root.
        root /usr/share/nginx/html;
        index index.html;

        # SPA fallback: any path that doesn't match a static file returns
        # index.html so React Router can handle client-side routing.
        location / {
            try_files $uri $uri/ /index.html;
        }

        # Reverse-proxy /api/* requests to the FastAPI backend.
        # The trailing slash on proxy_pass strips the /api prefix before
        # forwarding, so the backend sees /items not /api/items.
        location /api/ {
            proxy_pass {{ .Values.backendServiceUrl }}/;
            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            # Larger buffers accommodate responses with many items or long presigned URLs.
            proxy_buffer_size   128k;
            proxy_buffers       4 256k;
        }

        # Serve config.js with no-cache headers so every page load receives
        # the latest runtime configuration — critical for env changes without rebuild.
        location = /config.js {
            add_header Cache-Control "no-store, no-cache, must-revalidate";
            try_files $uri =404;
        }

        # Security headers applied to all responses.
        add_header X-Frame-Options         "SAMEORIGIN";
        add_header X-Content-Type-Options  "nosniff";
        add_header Referrer-Policy         "strict-origin-when-cross-origin";
    }

  # ── config.js.template ──────────────────────────────────────────────────────
  # Mounted to /usr/share/nginx/html/config.js.template.
  # The docker-entrypoint.sh substitutes ${APP_*} with container env vars,
  # producing /usr/share/nginx/html/config.js served to browser clients.
  #
  # The React app reads this in src/main.tsx:
  #   const cfg = (window as any).__APP_CONFIG__ ?? {}
  #   Object.assign(import.meta.env, { VITE_KEYCLOAK_URL: cfg.KEYCLOAK_URL, ... })
  config.js.template: |
    // Runtime configuration — generated by docker-entrypoint.sh at container startup.
    // Values are injected from Kubernetes environment variables (see Deployment env block).
    // This file is served with Cache-Control: no-store so it is never cached.
    window.__APP_CONFIG__ = {
      KEYCLOAK_URL:       "${APP_KEYCLOAK_URL}",
      KEYCLOAK_REALM:     "${APP_KEYCLOAK_REALM}",
      KEYCLOAK_CLIENT_ID: "${APP_KEYCLOAK_CLIENT_ID}",
      API_URL:            "${APP_API_URL}",
      ALLOWED_GROUPS:     "${APP_ALLOWED_GROUPS}",
      ADMIN_ROLE:         "${APP_ADMIN_ROLE}"
    };
