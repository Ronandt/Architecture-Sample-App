# =============================================================================
# Frontend Ingress
#
# Routes external HTTP/HTTPS traffic to the frontend Service.
# Enable with: ingress.enabled=true (set in values.yaml or via --set).
#
# OpenShift note: When using the OpenShift router (HAProxy), Ingress resources
# are automatically converted to Routes. Alternatively, create a Route directly
# using `oc expose svc/...` if you prefer native OpenShift resources.
# =============================================================================
{{- if .Values.ingress.enabled }}
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: {{ include "frontend.fullname" . }}
  labels:
    {{- include "frontend.labels" . | nindent 4 }}
  {{- with .Values.ingress.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  {{- if .Values.ingress.className }}
  ingressClassName: {{ .Values.ingress.className }}
  {{- end }}
  {{- if .Values.ingress.tls.enabled }}
  tls:
    - hosts:
        - {{ .Values.ingress.host | quote }}
      secretName: {{ .Values.ingress.tls.secretName }}
  {{- end }}
  rules:
    - host: {{ .Values.ingress.host | quote }}
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: {{ include "frontend.fullname" . }}
                port:
                  number: {{ .Values.service.port }}
{{- end }}
